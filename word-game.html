<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Guess the Word</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0f0e17;--card:#1a1928;--accent:#ff6b6b;--gold:#ffd166;--green:#06d6a0;--blue:#118ab2;--text:#fffffe;--muted:#a7a9be;}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;touch-action:manipulation;}

  /* ── HUD ── */
  #hud{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;flex-shrink:0;z-index:10;}
  .hud-box{background:var(--card);border-radius:14px;padding:5px 14px;text-align:center;min-width:76px;}
  .hud-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .hud-val{font-family:'Fredoka One',cursive;font-size:22px;color:var(--gold);line-height:1.1;}
  #progress{display:flex;gap:8px;align-items:center;}
  .prog-dot{width:10px;height:10px;border-radius:50%;background:#333;transition:background .3s;}
  .prog-dot.done{background:var(--green);}
  .prog-dot.active{background:var(--gold);box-shadow:0 0 6px var(--gold);}

  /* ── GAME AREA ── */
  #game{width:100%;max-width:480px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px 12px;position:relative;overflow:hidden;}

  /* ── REVEAL PHASE ── */
  #reveal-phase{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;}
  #img-wrap{width:100%;max-width:300px;aspect-ratio:1;border-radius:22px;overflow:hidden;position:relative;background:#1a1a2e;box-shadow:0 8px 40px rgba(0,0,0,.7);flex-shrink:0;}
  #puzzle-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  #stop-btn{width:78px;height:78px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff8a8a,#cc0000);border:none;cursor:pointer;box-shadow:0 0 0 5px rgba(255,107,107,.25),0 6px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:transform .12s;flex-shrink:0;}
  #stop-btn:active{transform:scale(.88);}
  #stop-btn svg{width:30px;height:30px;}

  #say-btn{padding:0 20px;height:78px;border-radius:22px;background:linear-gradient(135deg,#a29bfe,#6c5ce7);border:none;cursor:pointer;box-shadow:0 0 0 4px rgba(162,155,254,.25),0 6px 20px rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .12s;flex-shrink:0;}
  #say-btn:active{transform:scale(.9);}
  #say-btn .sb-icon{font-size:26px;line-height:1;}
  #say-btn .sb-text{font-family:'Fredoka One',cursive;font-size:11px;color:#fff;text-align:center;line-height:1.2;}
  #say-btn.listening{animation:pulse-mic .7s ease-in-out infinite alternate;background:linear-gradient(135deg,#fd79a8,#e84393);}
  @keyframes pulse-mic{from{box-shadow:0 0 0 4px rgba(253,121,168,.3),0 6px 20px rgba(0,0,0,.5);}to{box-shadow:0 0 0 12px rgba(253,121,168,.0),0 6px 20px rgba(0,0,0,.5);}}

  #mic-feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card);border-radius:24px;padding:18px 28px;text-align:center;z-index:150;pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;border:2px solid rgba(255,255,255,.1);box-shadow:0 8px 40px rgba(0,0,0,.6);min-width:220px;}
  #mic-feedback .mf-emoji{font-size:44px;display:block;margin-bottom:6px;}
  #mic-feedback .mf-text{font-family:'Fredoka One',cursive;font-size:18px;color:var(--text);}
  #mic-feedback.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

  .btn-row{display:flex;gap:14px;align-items:center;justify-content:center;}
  .hint-text{font-size:12px;color:var(--muted);text-align:center;font-weight:700;}
  #letter-phase{display:none;width:100%;flex-direction:column;align-items:center;gap:10px;}
  #frozen-wrap{width:100%;max-width:185px;aspect-ratio:1;border-radius:16px;overflow:hidden;position:relative;background:#1a1a2e;box-shadow:0 6px 24px rgba(0,0,0,.7);flex-shrink:0;}
  #frozen-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #frozen-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(17,138,178,.2),rgba(6,214,160,.1));border:2px solid rgba(6,214,160,.35);border-radius:16px;pointer-events:none;}
  #answer-slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .slot{width:34px;height:40px;border-radius:10px;background:var(--card);border:2px solid #333;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:19px;color:var(--text);transition:border-color .2s,background .2s;}
  .slot.filled{border-color:var(--green);background:rgba(6,214,160,.13);}
  .slot.error{border-color:var(--accent);background:rgba(255,107,107,.13);animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  #oval-canvas{position:relative;width:300px;height:155px;margin-top:4px;flex-shrink:0;}
  .fly-letter{position:absolute;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:0 4px 12px rgba(0,0,0,.45);transform:translate(-50%,-50%);transition:opacity .2s;}
  .fly-letter.used{opacity:0!important;pointer-events:none;}

  /* ── FEEDBACK & NEXT ── */
  #feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Fredoka One',cursive;font-size:48px;z-index:100;pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;text-shadow:0 2px 12px rgba(0,0,0,.6);}
  #next-btn{display:none;padding:13px 38px;border-radius:50px;background:linear-gradient(135deg,var(--green),var(--blue));border:none;color:#fff;font-family:'Fredoka One',cursive;font-size:21px;cursor:pointer;box-shadow:0 6px 20px rgba(6,214,160,.4);transition:transform .12s;}
  #next-btn:active{transform:scale(.95);}

  /* ── END SCREEN ── */
  #end-screen{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200;padding:40px 30px;}
  #end-screen h1{font-family:'Fredoka One',cursive;font-size:40px;color:var(--gold);text-align:center;}
  #end-score{font-family:'Fredoka One',cursive;font-size:70px;color:var(--green);}
  #end-time{font-size:17px;color:var(--muted);}
  #restart-btn{margin-top:8px;padding:15px 48px;border-radius:50px;background:linear-gradient(135deg,var(--accent),#ff9f43);border:none;color:#fff;font-family:'Fredoka One',cursive;font-size:23px;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,107,.4);}
  .stars{font-size:36px;letter-spacing:4px;}


</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="score-val">0</div></div>
  <div id="progress"></div>
  <div class="hud-box"><div class="hud-label">Time</div><div class="hud-val" id="timer-val">0:00</div></div>
</div>

<!-- GAME -->
<div id="game">
  <!-- REVEAL -->
  <div id="reveal-phase">
    <div id="img-wrap"><canvas id="puzzle-canvas"></canvas></div>
    <div class="btn-row">
      <button id="stop-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <button id="say-btn">
        <span class="sb-icon">🎤</span>
        <span class="sb-text">Say it!<br>+bonus!</span>
      </button>
    </div>
    <div class="hint-text">■ Tap to spell &nbsp;|&nbsp; 🎤 Say the word!</div>
  </div>

  <!-- LETTERS -->
  <div id="letter-phase">
    <div id="frozen-wrap"><canvas id="frozen-canvas"></canvas><div id="frozen-overlay"></div></div>
    <div id="answer-slots"></div>
    <div id="oval-canvas"></div>
  </div>

  <div id="feedback"></div>
  <div id="mic-feedback"><span class="mf-emoji">🎤</span><span class="mf-text"></span></div>
  <button id="next-btn">Next Word →</button>
</div>

<!-- END -->
<div id="end-screen">
  <div class="stars">⭐⭐⭐</div>
  <h1>Well Done!</h1>
  <div id="end-score">0</div>
  <div id="end-time">Total time: 0:00</div>
  <button id="restart-btn" onclick="restartGame()">Play Again</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════

// ── GAME STATE ────────────────────────────────────────────────────────────────
const WORDS = ['cupboard','glass','bath','fridge','mirror','sofa'];
const GCOLS=4,GROWS=4,TOTAL=GCOLS*GROWS;
const REVEAL_MS=950;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

let wordList,wordIdx,score,startTime,timerInt;
let revTimer,revCount,pieceOrder,srcBitmap;
let currentWord,letterObjs,answerProg,gamePhase;

const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d,v=.28){const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}
function sndOk(){tone(880,'sine',.1);setTimeout(()=>tone(1100,'sine',.13,.2),90);}
function sndBad(){tone(180,'sawtooth',.22,.32);}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.2,.25),i*80));}

// ── SPEECH RECOGNITION ───────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeech = !!SpeechRecognition;

if(!hasSpeech){
  // Hide say button if not supported
  document.addEventListener('DOMContentLoaded',()=>{
    const b = document.getElementById('say-btn');
    if(b) b.style.display='none';
  });
}

let recog = null;
let isListening = false;

function showMicFeedback(emoji, text, duration=2000){
  const el = document.getElementById('mic-feedback');
  el.querySelector('.mf-emoji').textContent = emoji;
  el.querySelector('.mf-text').textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), duration);
}

function startSpeechRecognition(){
  if(!hasSpeech){ showMicFeedback('😕','Not supported in this browser'); return; }
  if(isListening) return;
  if(gamePhase !== 'reveal') return;

  recog = new SpeechRecognition();
  recog.lang = 'en-US';
  recog.interimResults = false;
  recog.maxAlternatives = 5;

  isListening = true;
  const btn = document.getElementById('say-btn');
  btn.classList.add('listening');
  btn.querySelector('.sb-icon').textContent = '🔴';
  showMicFeedback('🎤','Listening...', 8000);

  recog.onresult = (e) => {
    isListening = false;
    btn.classList.remove('listening');
    btn.querySelector('.sb-icon').textContent = '🎤';

    // collect all alternatives
    const alts = Array.from(e.results[0]).map(r => r.transcript.trim().toLowerCase());
    console.log('[Speech] heard:', alts);

    const target = currentWord.toLowerCase();
    const matched = alts.some(a => a === target || a.includes(target));

    if(matched){
      // bonus depends on how few pieces revealed
      const revealRatio = revCount / TOTAL;
      const bonus = Math.round(60 * (1 - revealRatio)) + 40;
      score += bonus;
      document.getElementById('score-val').textContent = score;
      tone(880,'sine',.1); setTimeout(()=>tone(1320,'sine',.18,.3),100);
      showMicFeedback('🎉', `"${currentWord}"! +${bonus} pts!`, 2200);
      clearInterval(revTimer);
      setTimeout(()=>goToLetters(), 2300);
    } else {
      tone(200,'sawtooth',.2,.25);
      const heard = alts[0] || '?';
      showMicFeedback('🤔', `I heard "${heard}"… try again!`, 2000);
    }
  };

  recog.onerror = (e) => {
    isListening = false;
    btn.classList.remove('listening');
    btn.querySelector('.sb-icon').textContent = '🎤';
    const msg = e.error === 'not-allowed' ? 'Microphone blocked!\nAllow mic in browser.' :
                e.error === 'no-speech'   ? 'No speech detected' : 'Try again!';
    showMicFeedback('😕', msg, 2500);
  };

  recog.onend = () => {
    isListening = false;
    btn.classList.remove('listening');
    btn.querySelector('.sb-icon').textContent = '🎤';
  };

  recog.start();
}

document.getElementById('say-btn').addEventListener('click', ()=>{
  if(gamePhase !== 'reveal') return;
  AC.resume();
  if(isListening){
    recog && recog.stop();
  } else {
    startSpeechRecognition();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
function initGame(){
  wordList=shuffle([...WORDS]);wordIdx=0;score=0;
  startTime=Date.now();clearInterval(timerInt);
  timerInt=setInterval(()=>{const s=0|(Date.now()-startTime)/1000,m=0|s/60,ss=s%60;document.getElementById('timer-val').textContent=`${m}:${ss.toString().padStart(2,'0')}`;},500);
  document.getElementById('score-val').textContent=0;
  buildProg();
  document.getElementById('end-screen').style.display='none';
  startWord();
}

function buildProg(){
  const p=document.getElementById('progress');p.innerHTML='';
  wordList.forEach((_,i)=>{const d=document.createElement('div');d.className='prog-dot'+(i===wordIdx?' active':'');p.appendChild(d);});
}
function updProg(){
  document.querySelectorAll('.prog-dot').forEach((d,i)=>{d.className='prog-dot';if(i<wordIdx)d.classList.add('done');else if(i===wordIdx)d.classList.add('active');});
}

// ── WORD START ────────────────────────────────────────────────────────────────
function startWord(){
  currentWord=wordList[wordIdx];gamePhase='reveal';updProg();
  document.getElementById('reveal-phase').style.display='flex';
  document.getElementById('letter-phase').style.display='none';
  document.getElementById('next-btn').style.display='none';
  clearInterval(revTimer);revCount=0;srcBitmap=null;

  const canvas=document.getElementById('puzzle-canvas');
  const wrap=document.getElementById('img-wrap');

  function sizeC(){canvas.width=wrap.clientWidth||300;canvas.height=wrap.clientHeight||300;}

  function beginPuzzle(bmp){
    srcBitmap=bmp;sizeC();
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
    pieceOrder=shuffle([...Array(TOTAL)].map((_,i)=>i));
    revCount=0;
    revTimer=setInterval(revealPiece,REVEAL_MS);
  }

  function revealPiece(){
    if(gamePhase!=='reveal'){clearInterval(revTimer);return;}
    if(revCount>=TOTAL){clearInterval(revTimer);setTimeout(()=>{if(gamePhase==='reveal')goToLetters();},900);return;}
    const W=canvas.width,H=canvas.height;
    const pw=W/GCOLS,ph=H/GROWS;
    const idx=pieceOrder[revCount];
    const col=idx%GCOLS,row=0|idx/GCOLS;
    const x=col*pw,y=row*ph;
    const ctx=canvas.getContext('2d');
    ctx.save();
    const r=7;
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+pw-r,y);ctx.arcTo(x+pw,y,x+pw,y+r,r);
    ctx.lineTo(x+pw,y+ph-r);ctx.arcTo(x+pw,y+ph,x+pw-r,y+ph,r);
    ctx.lineTo(x+r,y+ph);ctx.arcTo(x,y+ph,x,y+ph-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();ctx.clip();
    ctx.drawImage(srcBitmap,x/W*400,y/H*400,pw/W*400,ph/H*400,x,y,pw,ph);
    ctx.restore();
    ctx.strokeStyle='rgba(15,14,23,.55)';ctx.lineWidth=2.5;ctx.strokeRect(x+1,y+1,pw-2,ph-2);
    revCount++;
  }

  const svgStr=CARTOON[currentWord]||'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><rect width="400" height="400" fill="#222"/></svg>';
  const blob=new Blob([svgStr],{type:'image/svg+xml'});
  const burl=URL.createObjectURL(blob);
  const img=new Image();img.width=400;img.height=400;
  img.onload=()=>{
    const oc=document.createElement('canvas');oc.width=400;oc.height=400;
    oc.getContext('2d').drawImage(img,0,0,400,400);
    URL.revokeObjectURL(burl);
    beginPuzzle(oc);
  };
  img.src=burl;
}

// ── BUTTON HANDLERS ───────────────────────────────────────────────────────────
document.getElementById('stop-btn').addEventListener('click',()=>{
  if(gamePhase!=='reveal')return;
  AC.resume();clearInterval(revTimer);goToLetters();
});

// ── FREEZE IMAGE HELPER ───────────────────────────────────────────────────────
function freezeImage(){
  const src=document.getElementById('puzzle-canvas');
  const dst=document.getElementById('frozen-canvas');
  const fw=document.getElementById('frozen-wrap');
  dst.width=fw.clientWidth||185;dst.height=fw.clientHeight||185;
  dst.getContext('2d').drawImage(src,0,0,dst.width,dst.height);
}

// ── GO TO LETTERS ─────────────────────────────────────────────────────────────
function goToLetters(){
  gamePhase='letters';
  freezeImage();
  document.getElementById('reveal-phase').style.display='none';
  document.getElementById('letter-phase').style.display='flex';
  buildSlots();buildLetters();
}

// ── ANSWER SLOTS ──────────────────────────────────────────────────────────────
function buildSlots(){
  answerProg=0;
  const w=document.getElementById('answer-slots');w.innerHTML='';
  for(let i=0;i<currentWord.length;i++){const s=document.createElement('div');s.className='slot';s.id=`slot-${i}`;w.appendChild(s);}
}

// ── ORBITAL LETTERS ───────────────────────────────────────────────────────────
const OW=300,OH=155,OCX=150,OCY=77,ORX=114,ORY=57;
const MIN_ANG=0.38;

function buildLetters(){
  const cv=document.getElementById('oval-canvas');cv.innerHTML='';
  const correct=currentWord.toUpperCase().split('');
  const pool=shuffle('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(c=>!correct.includes(c)));
  const extra=Math.min(5,Math.max(3,Math.ceil(correct.length*.7)));
  const all=shuffle([...correct,...pool.slice(0,extra)]);
  const N=all.length;
  const cols=['#ff6b6b','#ffd166','#06d6a0','#118ab2','#a29bfe','#fd79a8','#fdcb6e','#00b894','#e17055','#74b9ff'];
  const baseSpeed=0.45;
  letterObjs=all.map((ch,i)=>{
    const el=document.createElement('div');
    el.className='fly-letter';el.textContent=ch;
    el.style.background=cols[i%cols.length];el.style.color='#fff';
    cv.appendChild(el);
    const angle=(2*Math.PI/N)*i-Math.PI/2;
    const speed=baseSpeed+(Math.random()-.5)*0.08;
    el.addEventListener('pointerdown',e=>{e.preventDefault();onLetterTap(el,ch);});
    return{el,ch,angle,speed};
  });
  animLetters();
}

let raf;
function animLetters(){
  cancelAnimationFrame(raf);
  let last=null;
  function step(ts){
    if(!last)last=ts;
    const dt=Math.min((ts-last)/1000,.05);last=ts;
    const active=letterObjs.filter(o=>!o.el.classList.contains('used'));
    active.forEach(o=>{o.angle+=o.speed*dt;});
    for(let it=0;it<2;it++){
      for(let i=0;i<active.length;i++){
        for(let j=i+1;j<active.length;j++){
          const a=active[i],b=active[j];
          let da=b.angle-a.angle;
          da=da-Math.round(da/(2*Math.PI))*2*Math.PI;
          const abs=Math.abs(da);
          if(abs<MIN_ANG&&abs>0.001){
            const push=(MIN_ANG-abs)*0.5*0.3;
            const sign=da>0?1:-1;
            a.angle-=sign*push;b.angle+=sign*push;
          }
        }
      }
    }
    active.forEach(o=>{
      o.el.style.left=`${OCX+ORX*Math.cos(o.angle)}px`;
      o.el.style.top=`${OCY+ORY*Math.sin(o.angle)}px`;
    });
    if(gamePhase==='letters')raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
}

function onLetterTap(el,ch){
  if(gamePhase!=='letters')return;
  const exp=currentWord[answerProg].toUpperCase();
  if(ch===exp){
    sndOk();el.classList.add('used');
    const sl=document.getElementById(`slot-${answerProg}`);
    sl.textContent=ch;sl.classList.add('filled');
    answerProg++;
    if(answerProg===currentWord.length)wordDone();
  }else{
    sndBad();
    const sl=document.getElementById(`slot-${answerProg}`);
    sl.classList.add('error');setTimeout(()=>sl.classList.remove('error'),400);
    score=Math.max(0,score-5);document.getElementById('score-val').textContent=score;
  }
}

function wordDone(){
  gamePhase='next';cancelAnimationFrame(raf);sndWin();
  const ratio=revCount/TOTAL;
  const bonus=Math.round(100*(1-ratio)+50);
  score+=bonus;document.getElementById('score-val').textContent=score;
  showFb('⭐ +'+bonus);
  setTimeout(()=>{
    if(wordIdx<wordList.length-1)document.getElementById('next-btn').style.display='block';
    else setTimeout(showEnd,800);
  },900);
}

document.getElementById('next-btn').addEventListener('click',()=>{
  document.getElementById('next-btn').style.display='none';wordIdx++;startWord();
});

function showFb(t){
  const f=document.getElementById('feedback');f.textContent=t;
  f.style.transform='translate(-50%,-50%) scale(1)';f.style.opacity='1';
  setTimeout(()=>{f.style.transform='translate(-50%,-50%) scale(0)';f.style.opacity='0';},900);
}

function showEnd(){
  clearInterval(timerInt);
  const e=0|(Date.now()-startTime)/1000,m=0|e/60,s=e%60;
  document.getElementById('end-score').textContent=score;
  document.getElementById('end-time').textContent=`Total time: ${m}:${s.toString().padStart(2,'0')}`;
  document.querySelector('#end-screen .stars').textContent=score>=500?'⭐⭐⭐':score>=300?'⭐⭐':'⭐';
  document.getElementById('end-screen').style.display='flex';
}
function restartGame(){initGame();}
window.addEventListener('load',()=>initGame());
</script>
